<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Mania Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'display': ['Lato', 'sans-serif'],
                        'body': ['Lato', 'sans-serif'],
                    },
                    colors: {
                        'brand-blue': '#007AFF',
                        'brand-dark': '#0F172A',
                        'accent-blue': '#3B82F6',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0F172A;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 122, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 40%);
            font-family: 'Lato', sans-serif;
        }
        .nav-glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .input-field {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #007AFF;
            background: rgba(30, 41, 59, 0.6);
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.2);
        }
        .btn-send {
            background: #007AFF;
            transition: all 0.3s ease;
        }
        .btn-send:hover {
            background: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
        }
        .loading-spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: white; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-white">

    <nav class="fixed top-0 w-full z-50 nav-glass">
    <div class="max-w-7xl mx-auto px-6 py-4">
        <div class="flex justify-between items-center">
            <a href="index.html">
                <img src="../logo.png" alt="Mania Digital" class="h-9 md:h-11 w-auto object-contain">
            </a>

            <button id="menu-btn" class="md:hidden text-slate-500 hover:text-brand-blue focus:outline-none">
                <i class="fas fa-bars text-2xl"></i>
            </button>

            <ul class="hidden md:flex gap-8 items-center font-bold">
                <li><a href="index.html#inicio" class="text-slate-500 hover:text-brand-blue transition-colors text-sm uppercase tracking-wider">Inicio</a></li>
                <li><a href="contacto.html" class="text-slate-500 hover:text-brand-blue transition-colors text-sm uppercase tracking-wider">Contacto</a></li>
                <li><a href="catalogo.html" class="px-6 py-2 bg-brand-blue text-white rounded-full text-sm hover:bg-slate-900 transition-all uppercase tracking-widest shadow-lg shadow-blue-500/20">Catálogo</a></li>
            </ul>
        </div>

        <div id="mobile-menu" class="hidden md:hidden pt-4 pb-2">
    <ul class="flex flex-col gap-4 font-bold border-t border-gray-100 mt-4 pt-4">
        <li><a href="index.html#inicio" class="text-slate-500 hover:text-brand-blue transition-colors text-sm uppercase tracking-wider">Inicio</a></li>
        <li><a href="contacto.html" class="text-brand-blue transition-colors text-sm uppercase tracking-wider">Contacto</a></li>
        <li> <li><a href="catalogo.html" class="text-slate-500 hover:text-brand-blue transition-colors text-sm uppercase tracking-wider">Catálogo</a></li>
            <a href="catalogo.html#cotizacion" class="block text-center px-6 py-2 bg-brand-blue text-white rounded-full text-sm hover:bg-slate-900 transition-all uppercase tracking-widest">
                Cotizar
            </a>
        </li>
    </ul>
</div>
    </div>
</nav>

<script>
    const btn = document.getElementById('menu-btn');
    const menu = document.getElementById('mobile-menu');

    btn.addEventListener('click', () => {
        menu.classList.toggle('hidden');
    });

    // Cerrar menú al hacer click en un enlace (opcional)
    menu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => menu.classList.add('hidden'));
    });
</script>
    

    <section class="min-h-screen flex items-center justify-center pt-32 pb-20 px-6">
    <div class="max-w-6xl w-full grid md:grid-cols-2 gap-12 items-start">
        
        <div class="space-y-8 order-1 pt-12">
            <h1 class="text-5xl font-black italic">Contáctenos <span class="text-brand-blue">hoy mismo</span></h1>
            <div class="space-y-6">
                <p class="text-gray-400 text-lg leading-relaxed">
                    ¿Tiene alguna duda técnica o busca un repuesto específico? Nuestro equipo le responderá a la brevedad.
                </p>

                <div class="flex flex-col gap-6 pt-4">
                    <div class="flex items-center gap-6">
                        <a href="https://wa.me/50689467575" target="_blank" 
                           class="text-green-500 hover:text-green-400 transition-all hover:scale-110 text-2xl" title="WhatsApp">
                            <i class="fab fa-whatsapp"></i>
                        </a>
                        <a href="https://www.facebook.com/MANIADIGITAL/" target="_blank" 
                           class="text-blue-600 hover:text-blue-500 transition-all hover:scale-110 text-2xl" title="Facebook">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                    </div>

                    <div class="flex flex-col gap-3">
                        <div class="flex items-center gap-3 text-gray-400">
                            <i class="fas fa-envelope text-orange-500 text-lg w-6 text-center"></i>
                            <span class="text-sm font-medium tracking-wide">ventas@maniadigital.com</span>
                        </div>
                        <div class="flex items-center gap-3 text-gray-400">
                            <i class="fas fa-phone text-orange-500 text-lg w-6 text-center"></i>
                            <span class="text-sm font-medium tracking-wide">+506 2290-7322</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white/5 border border-white/10 p-8 md:p-10 rounded-[2.5rem] backdrop-blur-md shadow-2xl order-2">
            <form id="contactForm" class="space-y-5">
                <h2 class="text-2xl font-black italic mb-6">Envíenos un <span class="text-brand-blue">mensaje</span></h2>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-2 block">Nombre Completo</label>
                    <input type="text" name="user_name" id="user_name" required 
                        class="w-full p-4 rounded-xl outline-none input-field text-white" placeholder="Ej: Juan Pérez">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-2 block">Correo Electrónico</label>
                    <input type="email" name="user_email" id="user_email" required 
                        class="w-full p-4 rounded-xl outline-none input-field text-white" placeholder="correo@ejemplo.com">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-2 block">Asunto</label>
                    <select name="subject" id="subject" class="w-full p-4 rounded-xl outline-none input-field text-white appearance-none">
                        <option value="Soporte Técnico">Soporte Técnico</option>
                        <option value="Consulta de Repuestos">Consulta de Repuestos</option>
                        <option value="Ventas Corporativas">Ventas Corporativas</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-2 block">Mensaje</label>
                    <textarea name="message" id="message" rows="4" required 
                        class="w-full p-4 rounded-xl outline-none input-field text-white" placeholder="¿En qué podemos ayudarle?"></textarea>
                </div>
                <button type="submit" id="submitBtn" class="w-full btn-send py-5 rounded-xl font-black uppercase text-xs tracking-widest text-white shadow-xl shadow-blue-500/20">
                    Enviar Mensaje
                </button>
                <div id="form-status" class="hidden mt-4 p-4 rounded-xl text-center font-bold text-sm"></div>
            </form>
        </div>

    </div>
</section>

    <footer class="py-20 px-6 border-t border-white/5">
        <div class="max-w-7xl mx-auto text-center">
            <p class="text-gray-500 text-sm font-medium uppercase tracking-[0.3em]">© 2026 Mania Digital</p>
        </div>
    </footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function() {
            emailjs.init('JiRu-fg3Nu5uxAEVG'); 
        })();

        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('form-status');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> ENVIANDO...';
            status.classList.add('hidden');
            const params = {
                from_name: document.getElementById('user_name').value.trim(),
                reply_to: document.getElementById('user_email').value.trim(),
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value.trim()
            };

            try {
                const response = await emailjs.send('service_pk233s4', 'template_b8b2uag', params);
                status.innerText = "✓ Mensaje enviado correctamente.";
                status.className = "mt-4 p-4 rounded-xl text-center bg-green-500/20 text-green-400 block";
                this.reset();
            } catch (err) {
                status.innerText = "Error: " + (err.text || "Verifica los IDs de EmailJS");
                status.className = "mt-4 p-4 rounded-xl text-center bg-red-500/20 text-red-400 block";
            } finally {
                btn.disabled = false;
                btn.innerText = 'Enviar Mensaje';
            }
        });
    </script>
</body>
</html>
